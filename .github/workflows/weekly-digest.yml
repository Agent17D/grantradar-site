name: Weekly Grant Digest

on:
  # Runs every Tuesday at 7am CT = 12:00 UTC (UTC-5 in winter, UTC-6 in summer)
  # We use 12:00 UTC which is 7am CST / 6am CDT — close enough year-round.
  # Adjust to 13:00 UTC if you prefer exact 7am CDT during daylight saving.
  schedule:
    - cron: "0 12 * * 2"   # "At 12:00 on Tuesday"

  # Allow manual trigger from the Actions tab (useful for testing)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch & score only, skip sends)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  send-digest:
    name: Build & Send Grant Digest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── Run the digest pipeline ──────────────────────────────────────────────
      - name: Run weekly digest pipeline
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:  ${{ secrets.BEEHIIV_PUB_ID }}
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL:      ${{ secrets.FROM_EMAIL }}
          # Expose dry-run flag to the script (optional — handled by script)
          DRY_RUN:         ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/digest.py

      # ── Commit archive files ─────────────────────────────────────────────────
      - name: Commit archive files
        run: |
          git config user.name "GrantRadar Bot"
          git config user.email "digest@grantradar.news"
          git add archive/
          git diff --staged --quiet || git commit -m "Add digest archive: $(date +%Y-%m-%d)"
          git push

      # ── Upload digest artifact (for debugging) ───────────────────────────────
      - name: Archive digest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-run-${{ github.run_number }}
          path: |
            scripts/digest.py
          retention-days: 14
